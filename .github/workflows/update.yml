name: Update Japan Portfolio Hourly

on:
  schedule:
    - cron: "0 * * * *"    # Runs at the 0th minute of every hour
  workflow_dispatch:        # Allows manual trigger

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      # Step 1: checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: set up Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # Step 3: install dependencies
      - name: Install dependencies
        run: |
          pip install --upgrade pandas yfinance openpyxl

      # Step 4: run Python script
      - name: Run portfolio updater
        run: python updater.py

      # Step 5: commit and push updated CSVs
      - name: Commit updated CSVs
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add prices_history.csv portfolio_value_history.csv
          git commit -m "Hourly update Japan portfolio"
          git push